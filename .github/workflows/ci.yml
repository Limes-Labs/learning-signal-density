name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 -m unittest discover -s tests
      - run: python3 -m learning_signal_density --output-json results/ci-smoke.json --output-md results/ci-smoke.md --seeds 3 5 --material-count 24 --epochs 3
      - run: git diff --check
